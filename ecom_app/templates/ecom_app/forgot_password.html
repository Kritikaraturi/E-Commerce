{% extends "ecom_app/base.html" %}
{% load static %}

{% block title %}Forgot Password{% endblock %}

{% block content %}

<div style="display:flex; justify-content:center; align-items:center; height:330px;">
    <div style="width:500px; height: 300px; padding:30px; border:1px solid #ddd; border-radius:10px; box-shadow:0 4px 8px rgba(0,0,0,0.1);">
        <h2 style="text-align:center; margin-bottom:25px; color:#333;">Forgot Password</h2>
         <form method="post" style="display:flex; flex-direction:column;">
            {% csrf_token %}
            
            <input type="email" name="email" placeholder="Enter your registered email" required
                   style="padding:10px; margin-bottom:20px; border-radius:5px; border:1px solid #ccc; font-size:14px;">
            
         <div class="text-center mt-3">
            <button type="reset" 
                class="btn btn-success rounded" 
                style="width: 150px; height: 40px; font-size: 18px;">
                Next
            </button>
        </div>
        </form>
    </div>
</div>
{% endblock %}
