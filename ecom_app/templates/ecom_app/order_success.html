{% extends "ecom_app/base.html" %}
{% load static %}

{% block content %}

<div class="container mt-5">

    <div class="card shadow-lg p-5 rounded-4 text-center mx-auto" 
         style="max-width: 600px;">

        <!-- Success Icon -->
        <div style="font-size:60px;">✅</div>

        <h2 class="text-success mt-3">Order Placed Successfully!</h2>

        <p class="text-muted mb-4">
            Thank you for your purchase. Your order has been placed successfully.
        </p>

        <!-- Buttons -->
        <div class="d-flex justify-content-center gap-3 mt-4">

            <a href="{% url 'home' %}" class="btn btn-primary px-4">
                Continue Shopping
            </a>

            <a href="{% url 'my_orders' %}" class="btn btn-outline-dark px-4">
                View Orders
            </a>

        </div>

    </div>

</div>

{% endblock %}
