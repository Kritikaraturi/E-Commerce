{% extends "ecom_app/base.html" %}
{% load static %}

{% block title %}Reset Password{% endblock %}


{% block content %}
<div style="display:flex; justify-content:center; align-items:center; height:400px;">
    <div style="width:500px; height: 330px; padding:30px; border:1px solid #ddd; border-radius:10px; box-shadow:0 4px 8px rgba(0,0,0,0.1);">
        <h2 style="text-align:center; margin-bottom:20px; color:#333;">Reset Password</h2>
        
        <form method="post" style="display:flex; flex-direction:column;">
            {% csrf_token %}
            <input type="password" name="password" placeholder="New Password" required
                   style="padding:10px; margin-bottom:15px; border-radius:5px; border:1px solid #ccc; font-size:14px;">
            
            <input type="password" name="password2" placeholder="Confirm Password" required
                   style="padding:10px; margin-bottom:20px; border-radius:5px; border:1px solid #ccc; font-size:14px;">
            
            <div class="text-center mt-3">
                <button type="reset" class="btn btn-primary btn-lg px-4 py-2 rounded">
                     Reset
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
